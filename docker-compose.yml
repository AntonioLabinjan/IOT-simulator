version: "3.8"

services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: greenhouse-mqtt-broker
    ports:
      - "1883:1883"
    volumes:
      - ./broker/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./broker/data:/mosquitto/data
      - ./broker/log:/mosquitto/log
    restart: unless-stopped
